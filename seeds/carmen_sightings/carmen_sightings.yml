version: 2

seeds:
  - name: carmen_sightings__africa
    description: "Raw agent field reports from the Africa regional HQ (Casablanca/Johannesburg etc.), 1NF, already conformed to the common data dictionary."
    config:
      column_types:
        date_witness: date
        date_agent: date
        latitude: float
        longitude: float
        has_weapon: boolean
        has_hat: boolean
        has_jacket: boolean

